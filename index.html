<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurnTable</title>
</head>
<body>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@100&family=Zen+Kaku+Gothic+New:wght@700&display=swap');
        body{
            background-color: #debc8d;
        }
        #turntable {
            width: 500px;
            height: 500px;
            background-color: #d5d5d5;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left:350px;
            transform: translate(-50%, -50%);
        }
        @keyframes turntable-spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        #turntable-lp {
            width: 470px;
            height: 470px;
            background-color: #303030;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: turntable-spin 5s linear infinite;
            animation-play-state: paused;
        }
        #needlehandler {
            width: 50px;
            height: 50px;
            background-color: #dbdbdb;
            border-radius: 50%;
            position: absolute;
            top: 100px;
            left: 600px;
            transform: translate(-50%, -50%);
        }
        #needlebot {
            width: 40px;
            height: 40px;
            background-color: #5f5f5f;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #neddle{
            width: 8px;
            height: 400px;
            background-color: #5f5f5f;
            position: absolute;
            top: 300px;
            left: 600px;
            transform-origin: top;
            transform: translate(-50%, -50%) rotate(-5deg);
            transition: all 2s ease-in-out;
        }
        .turntable-lp-pic {
            width: 200px;
            height: 200px;
            background-color: #dbdbdb;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 200px;
            font-size: 30px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #bb2f2f;
        }
        #playbtn {
            width: 50px;
            height: 50px;
            background-color: #d14545;
            border-radius: 50%;
            position: absolute;
            top: 600px;
            left: 650px;
            transform: translate(-50%, -50%);
            box-shadow: 3px 3px 5px #d14545ba;
        }
        #music_box{
            width: 500px;
            height: 600px;
            background-color: #ffffff5a;
            border-radius: 10px;
            position: absolute;
            top: 50%;
            left: 1100px;
            transform: translate(-50%, -50%);
        }
        #music_cover{
            width: 250px;
            height: 250px;
            background-color: #ffffff;
            border-radius: 10px;
            position: absolute;
            top: 28%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #music_title{
            width: 250px;
            height: 50px;
            border-radius: 10px;
            position: absolute;
            top: 53%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 50px;
            font-size: 16px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: bold;
            color: #9b9b9b;
        }
        #artist{
            width: 250px;
            height: 50px;
            border-radius: 10px;
            position: absolute;
            top: 56%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 50px;
            font-size: 16px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: bold;
            color: #9b9b9b;
        }
        #music_playbtn{
            width: 50px;
            height: 50px;
            position: absolute;
            top: 65%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        #music_next{
            width: 40px;
            height: 40px;
            position: absolute;
            top: 65%;
            left: 63%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        #music_prev{
            width: 40px;
            height: 40px;
            position: absolute;
            top: 65%;
            left: 37%;
            transform-origin: center;
            transform: rotate(180deg) translate(50%, 50%);
            z-index: 100;
        }
        #music_loading_line{
            width: 250px;
            height: 2px;
            background-color: #9b9b9b;
            border-radius: 10px;
            position: absolute;
            top: 73%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes music-dot-move {
            0% {
                left: 0%;
            }
            100% {
                left: 100%;
            }
        }
        #music_dot{
            width: 10px;
            height: 10px;
            background-color: #9b9b9b;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 0%;
            transform: translate(-50%, -50%);
            animation: music-dot-move 180s linear infinite;
        }
    </style>

    <div id="turntable">
        <div id="turntable-lp">
            <div class="turntable-lp-pic">
                Music
            </div>
        </div>
    </div>
    <div id="needlehandler">
        <div id="needlebot"></div>
    </div>
    <div id="neddle">
    </div>
    <div id="playbtn"></div>    

    <div id="music_box">
        <img id="music_cover" src="https://i.namu.wiki/i/JFC21IQnAyjCurHBSYgiIjc8rkCPtWranLmNN7Md8nClfrhd3bU7gv6UFSjayn3LGof-PL9faUYqqBC4_dsrag.webp" alt=""></img>
        <div id="music_title">夜に駆ける</div>
        <div id="artist">YOASOBI</div>
        <img id="music_playbtn" src="https://cdn-icons-png.flaticon.com/512/3885/3885585.png" alt="">
        <img id="music_next" src="https://cdn-icons-png.flaticon.com/512/3318/3318722.png" alt="">
        <img id="music_prev" src="https://cdn-icons-png.flaticon.com/512/3318/3318722.png" alt="">
        <div id="music_loading_line">
            <div id="music_dot"></div>
        </div>
    </div>
</body>
<script>
    const playbtn = document.querySelector('#playbtn');
    const turntable = document.querySelector('#turntable-lp');
    const neddle = document.querySelector('#neddle');
    //make turntable spin when playbtn is clicked
    playbtn.addEventListener('click', () => {
        //make turntable spin until the playbtn is clicked again
        if (turntable.style.animationPlayState == 'paused') {
            turntable.style.animationPlayState = 'running';
        } else {
            turntable.style.animationPlayState = 'paused';
        }
        //rotate needle 30deg when playbtn is clicked and -5 when it is clicked again
        if (neddle.style.transform == 'translate(-50%, -50%) rotate(-5deg)') {
            neddle.style.transform = 'translate(-50%, -50%) rotate(13deg)';
        } else {
            neddle.style.transform = 'translate(-50%, -50%) rotate(-5deg)';
        }
    });

</script>
</html>
